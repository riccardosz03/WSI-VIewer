<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSI Viewer - {{ filename }}</title>
    <link rel="stylesheet" href="/static/css/style_viewer.css">
    <!-- OpenSeadragon CSS -->
    <style>
        #openseadragon-viewer {
            width: 100%;
            height: 100vh;
            background-color: #000;
        }
    </style>
</head>
<body>
    <div id="openseadragon-viewer"></div>
    
    <!-- OpenSeadragon Library da CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    
    <script>
        // Inizializza OpenSeadragon
        var viewer = OpenSeadragon({
            id: "openseadragon-viewer",
            prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
            
            // Sorgente dell'immagine (file .dzi)
            tileSources: "/slide/{{ filename }}.dzi",
            
            // Opzioni di visualizzazione
            showNavigator: true,           // Mostra la mini-mappa
            navigatorPosition: "TOP_RIGHT", // Posizione della mini-mappa
            showNavigationControl: true,    // Mostra i controlli di navigazione
            navigationControlAnchor: OpenSeadragon.ControlAnchor.TOP_LEFT,
            
            // Opzioni di zoom
            minZoomLevel: 0.5,
            maxZoomLevel: 10,
            zoomPerClick: 2,
            zoomPerScroll: 1.2,
            
            // Opzioni di performance
            animationTime: 0.5,
            immediateRender: false,
            
            // Gesture
            gestureSettingsMouse: {
                clickToZoom: false,
                dblClickToZoom: true
            },
            
            // Home button ritorna alla vista iniziale
            homeButton: "home-button",
            zoomInButton: "zoom-in",
            zoomOutButton: "zoom-out",
            fullPageButton: "full-page"
        });
        
        // Event listeners (opzionale per debugging)
        viewer.addHandler('open', function() {
            console.log('Slide caricata con successo: {{ filename }}');
        });
        
        viewer.addHandler('tile-loaded', function() {
            console.log('Tile caricato');
        });
        
        viewer.addHandler('open-failed', function(event) {
            console.error('Errore nel caricamento della slide:', event);
            alert('Errore nel caricamento della slide. Controlla la console per dettagli.');
        });
    </script>
</body>
</html>
